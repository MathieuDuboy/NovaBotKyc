# Reverse proxy nginx pour les 2 bots Nova (VPS 107.189.16.79, sandbox).
# URLs stables via nip.io (résout *.107.189.16.79.nip.io -> 107.189.16.79).
# À placer dans /etc/nginx/sites-available/nova-bots puis :
#   ln -s /etc/nginx/sites-available/nova-bots /etc/nginx/sites-enabled/nova-bots
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d kyc.107.189.16.79.nip.io -d card.107.189.16.79.nip.io
# (certbot ajoute lui-même les blocs 443 + la redirection HTTPS.)

# ── Bot A : kyc_bot (KYC + mini app) -> :3003 ──────────────────────────────
server {
    listen 80;
    server_name kyc.107.189.16.79.nip.io;

    # uploads pièce + selfie (multipart) : autoriser des fichiers un peu lourds
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ── Bot B : interlace_bot (utilisation carte) -> :3002 ─────────────────────
server {
    listen 80;
    server_name card.107.189.16.79.nip.io;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
