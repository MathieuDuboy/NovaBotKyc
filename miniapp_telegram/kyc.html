<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>KYC</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #0f1115);
    --card: var(--tg-theme-secondary-bg-color, #1b1e26);
    --text: var(--tg-theme-text-color, #f3f4f6);
    --hint: var(--tg-theme-hint-color, #8b90a0);
    --accent: var(--tg-theme-button-color, #3b82f6);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --border: rgba(255,255,255,.10);
    --ok:#22c55e; --err:#ef4444;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
  body{padding:0 18px 120px; max-width:520px; margin:0 auto;}
  header{position:sticky; top:0; background:var(--bg); padding:18px 0 12px; z-index:5;}
  .title{font-size:20px; font-weight:800; letter-spacing:-.3px; margin:0;}
  .subtitle{font-size:13px; color:var(--hint); margin:4px 0 14px;}
  .steps{display:flex; gap:6px;}
  .steps i{flex:1; height:4px; border-radius:99px; background:var(--border); transition:.3s;}
  .steps i.done{background:var(--accent);} .steps i.cur{background:var(--accent); opacity:.55;}
  .stepmeta{display:flex; justify-content:space-between; align-items:baseline; margin-top:10px;}
  .stepmeta b{font-size:16px; font-weight:700;} .stepmeta span{font-size:12px; color:var(--hint);}
  .viewport{overflow:hidden;}
  .track{display:flex; transition:transform .35s cubic-bezier(.4,0,.2,1);}
  .panel{min-width:100%; padding:6px 2px 2px; opacity:.4; transition:opacity .35s;}
  .panel.active{opacity:1;}
  label{display:block; font-size:12.5px; font-weight:600; color:var(--hint);
    margin:14px 2px 6px; text-transform:uppercase; letter-spacing:.4px;}
  .field{position:relative;}
  input,select{width:100%; padding:14px; font-size:16px; color:var(--text);
    background:var(--card); border:1.5px solid var(--border); border-radius:12px; outline:none;
    transition:border-color .15s, box-shadow .15s; appearance:none;}
  input:focus,select:focus{border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent);}
  input.bad,select.bad{border-color:var(--err);}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238b90a0' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center; padding-right:38px;}
  .row{display:flex; gap:10px;} .row>*{flex:1;} .row .grow2{flex:2;}
  .hint{font-size:11.5px; color:var(--hint); margin:5px 2px 0;}
  .seg{display:flex; gap:8px;}
  .seg button{flex:1; padding:13px; border:1.5px solid var(--border); background:var(--card);
    color:var(--text); border-radius:12px; font-size:15px; font-weight:600;}
  .seg button.on{border-color:var(--accent); background:color-mix(in srgb,var(--accent) 16%,transparent);}
  .drop{display:flex; align-items:center; gap:14px; padding:16px; border:1.5px dashed var(--border);
    border-radius:14px; background:var(--card); cursor:pointer; transition:.15s;}
  .drop:active{transform:scale(.99);}
  .drop.filled{border-style:solid; border-color:var(--ok);}
  .drop .ic{width:46px; height:46px; flex:none; border-radius:12px; display:grid; place-items:center;
    background:color-mix(in srgb,var(--accent) 18%,transparent); font-size:22px;}
  .drop .tx b{display:block; font-size:14.5px; font-weight:700;}
  .drop .tx small{color:var(--hint); font-size:12px;}
  .drop img{width:46px; height:46px; border-radius:12px; object-fit:cover; flex:none; display:none;}
  .drop.filled img{display:block;} .drop.filled .ic{display:none;}
  .err-msg{color:var(--err); font-size:12px; margin:6px 2px 0; display:none;}
  .err-msg.show{display:block;}
  .recap{background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden;}
  .recap div{display:flex; justify-content:space-between; gap:12px; padding:11px 14px; font-size:13.5px; border-top:1px solid var(--border);}
  .recap div:first-child{border-top:0;} .recap span{color:var(--hint);} .recap b{font-weight:600; text-align:right; word-break:break-word;}
  .fab{position:fixed; left:0; right:0; bottom:0; padding:14px 18px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,var(--bg) 22%); max-width:520px; margin:0 auto;}
  .fab button{width:100%; padding:16px; border:0; border-radius:14px; background:var(--accent);
    color:var(--accent-text); font-size:16px; font-weight:800;}
  .final{text-align:center; padding:40px 10px;}
  .final .emoji{font-size:54px;} .final h2{margin:14px 0 6px; font-size:20px;}
  .final p{color:var(--hint); font-size:14px; line-height:1.5;}
  .spin{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hide{display:none!important;}
</style>
</head>
<body>
  <header>
    <h1 class="title" data-i18n="title"></h1>
    <p class="subtitle" data-i18n="subtitle"></p>
    <div class="steps" id="bars"></div>
    <div class="stepmeta"><b id="stepTitle"></b><span id="stepCount"></span></div>
  </header>

  <main id="wizard">
    <div class="viewport"><div class="track" id="track">

      <section class="panel" data-tk="s_identity">
        <div class="row">
          <div class="field"><label data-i18n="l_first"></label><input name="firstName" data-req placeholder="Jean"><div class="err-msg" data-i18n="e_req"></div></div>
          <div class="field"><label data-i18n="l_last"></label><input name="lastName" data-req placeholder="Dupont"><div class="err-msg" data-i18n="e_req"></div></div>
        </div>
        <div class="hint" data-i18n="h_name"></div>
        <label data-i18n="l_dob"></label>
        <div class="field"><input name="dateOfBirth" type="date" data-req><div class="err-msg" data-i18n="e_req"></div></div>
        <label data-i18n="l_gender"></label>
        <div class="seg" id="genderSeg">
          <button type="button" data-v="M" data-i18n="g_m"></button>
          <button type="button" data-v="F" data-i18n="g_f"></button>
        </div>
        <input type="hidden" name="gender" data-req>
        <div class="err-msg" id="genderErr" data-i18n="e_gender"></div>
        <label data-i18n="l_nat"></label>
        <div class="field"><select name="nationality" data-req data-country></select><div class="err-msg" data-i18n="e_req"></div></div>
      </section>

      <section class="panel" data-tk="s_contact">
        <label data-i18n="l_email"></label>
        <div class="field"><input name="email" type="email" data-req placeholder="name@email.com"><div class="err-msg" data-i18n="e_email"></div></div>
        <label data-i18n="l_phone"></label>
        <div class="row">
          <div class="field" style="max-width:96px"><input name="phoneCountryCode" data-req placeholder="33" inputmode="numeric"><div class="err-msg" data-i18n="e_req"></div></div>
          <div class="field grow2"><input name="phoneNumber" data-req placeholder="612345678" inputmode="numeric"><div class="err-msg" data-i18n="e_req"></div></div>
        </div>
        <div class="hint" data-i18n="h_phone"></div>
      </section>

      <section class="panel" data-tk="s_address">
        <label data-i18n="l_addr"></label>
        <div class="field"><input name="addr_line1" data-req placeholder="123 Main St"><div class="err-msg" data-i18n="e_req"></div></div>
        <input name="addr_line2" data-i18n-ph="ph_line2" style="margin-top:8px">
        <div class="row">
          <div class="field grow2"><label data-i18n="l_city"></label><input name="addr_city" data-req placeholder="New York"><div class="err-msg" data-i18n="e_req"></div></div>
          <div class="field"><label data-i18n="l_state"></label><input name="addr_state" data-req maxlength="40" placeholder="NY / Gironde"><div class="err-msg" data-i18n="e_req"></div></div>
        </div>
        <div class="row">
          <div class="field"><label data-i18n="l_postal"></label><input name="addr_postal" data-req placeholder="10001"><div class="err-msg" data-i18n="e_req"></div></div>
          <div class="field"><label data-i18n="l_country"></label><select name="addr_country" data-req data-country></select><div class="err-msg" data-i18n="e_req"></div></div>
        </div>
        <div class="hint" data-i18n="h_addr"></div>
      </section>

      <section class="panel" data-tk="s_id">
        <div class="row">
          <div class="field grow2"><label data-i18n="l_idtype"></label>
            <select name="idType" data-req>
              <option value="PASSPORT" data-i18n="t_passport"></option>
              <option value="Government-Issued ID Card" data-i18n="t_idcard"></option>
              <option value="DLN" data-i18n="t_dln"></option>
            </select></div>
          <div class="field grow2"><label data-i18n="l_idnum"></label><input name="nationalId" data-req placeholder="G12345678"><div class="err-msg" data-i18n="e_req"></div></div>
        </div>
        <div class="row">
          <div class="field"><label data-i18n="l_issue"></label><input name="issueDate" type="date"></div>
          <div class="field"><label data-i18n="l_expiry"></label><input name="expiryDate" type="date"></div>
        </div>
        <label data-i18n="l_idfront"></label>
        <div class="drop" id="d_idFront"><div class="ic">🪪</div><img><div class="tx"><b data-i18n="d_front_t"></b><small data-i18n="d_front_s"></small></div></div>
        <input id="idFront" name="idFront" type="file" accept="image/*" capture="environment" class="hide" data-req>
        <div class="err-msg" id="idFrontErr" data-i18n="e_photo"></div>
        <div id="idBackWrap">
          <label data-i18n="l_idback"></label>
          <div class="drop" id="d_idBack"><div class="ic">🪪</div><img><div class="tx"><b data-i18n="d_back_t"></b><small data-i18n="d_back_s"></small></div></div>
        </div>
        <input id="idBack" name="idBack" type="file" accept="image/*" capture="environment" class="hide">
      </section>

      <section class="panel" data-tk="s_selfie">
        <p class="hint" style="margin-top:8px" data-i18n="h_selfie"></p>
        <div class="drop" id="d_selfie" style="margin-top:10px"><div class="ic">🤳</div><img><div class="tx"><b data-i18n="d_selfie_t"></b><small data-i18n="d_selfie_s"></small></div></div>
        <input id="selfie" name="selfie" type="file" accept="image/*" capture="user" class="hide" data-req>
        <div class="err-msg" id="selfieErr" data-i18n="e_photo"></div>
      </section>

      <section class="panel" data-tk="s_review">
        <p class="hint" style="margin-top:8px" data-i18n="h_review"></p>
        <div class="recap" id="recap"></div>
      </section>

    </div></div>
  </main>

  <div class="fab hide" id="fab"><button id="next"></button></div>
  <div id="done" class="final hide"></div>

    kyc_pending_t:"Уже в обработке",kyc_pending_p:"Ваша проверка на рассмотрении — уведомление придёт в бот.",kyc_passed_t:"Уже подтверждено ✅",kyc_passed_p:"Ваша проверка уже одобрена.",
    fail_t:"Ошибка",fail_p:"Не удалось отправить проверку. Проверьте данные и повторите попытку.",neterr_t:"Ошибка сети",idmiss_t:"Нет идентификатора",idmiss_p:"Откройте форму заново из бота."},
};
const tg = window.Telegram?.WebApp; if(tg){tg.ready(); tg.expand();}
const qs = new URLSearchParams(location.search);
const uid = qs.get('uid') || tg?.initDataUnsafe?.user?.id || '';
let lang = (qs.get('lang') || tg?.initDataUnsafe?.user?.language_code || 'en').slice(0,2).toLowerCase();
if(!I18N[lang]) lang='en';
const T = I18N[lang];
document.documentElement.lang=lang;
const t=k=>T[k]||k;
// applique les traductions
document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.dataset.i18n));
document.querySelectorAll('[data-i18n-ph]').forEach(e=>e.placeholder=t(e.dataset.i18nPh));

// --- Liste pays ISO-3166-1 alpha-2 (value = code ISO2 attendu par l'API) ---
const COUNTRIES="AF:Afghanistan|AX:Åland Islands|AL:Albania|DZ:Algeria|AS:American Samoa|AD:Andorra|AO:Angola|AI:Anguilla|AG:Antigua and Barbuda|AR:Argentina|AM:Armenia|AW:Aruba|AU:Australia|AT:Austria|AZ:Azerbaijan|BS:Bahamas|BH:Bahrain|BD:Bangladesh|BB:Barbados|BY:Belarus|BE:Belgium|BZ:Belize|BJ:Benin|BM:Bermuda|BT:Bhutan|BO:Bolivia|BA:Bosnia and Herzegovina|BW:Botswana|BR:Brazil|IO:British Indian Ocean Territory|BN:Brunei|BG:Bulgaria|BF:Burkina Faso|BI:Burundi|CV:Cabo Verde|KH:Cambodia|CM:Cameroon|CA:Canada|KY:Cayman Islands|CF:Central African Republic|TD:Chad|CL:Chile|CN:China|CO:Colombia|KM:Comoros|CG:Congo|CD:Congo (DRC)|CK:Cook Islands|CR:Costa Rica|CI:Côte d'Ivoire|HR:Croatia|CU:Cuba|CW:Curaçao|CY:Cyprus|CZ:Czechia|DK:Denmark|DJ:Djibouti|DM:Dominica|DO:Dominican Republic|EC:Ecuador|EG:Egypt|SV:El Salvador|GQ:Equatorial Guinea|ER:Eritrea|EE:Estonia|SZ:Eswatini|ET:Ethiopia|FK:Falkland Islands|FO:Faroe Islands|FJ:Fiji|FI:Finland|FR:France|GF:French Guiana|PF:French Polynesia|GA:Gabon|GM:Gambia|GE:Georgia|DE:Germany|GH:Ghana|GI:Gibraltar|GR:Greece|GL:Greenland|GD:Grenada|GP:Guadeloupe|GU:Guam|GT:Guatemala|GG:Guernsey|GN:Guinea|GW:Guinea-Bissau|GY:Guyana|HT:Haiti|HN:Honduras|HK:Hong Kong|HU:Hungary|IS:Iceland|IN:India|ID:Indonesia|IR:Iran|IQ:Iraq|IE:Ireland|IM:Isle of Man|IL:Israel|IT:Italy|JM:Jamaica|JP:Japan|JE:Jersey|JO:Jordan|KZ:Kazakhstan|KE:Kenya|KI:Kiribati|KW:Kuwait|KG:Kyrgyzstan|LA:Laos|LV:Latvia|LB:Lebanon|LS:Lesotho|LR:Liberia|LY:Libya|LI:Liechtenstein|LT:Lithuania|LU:Luxembourg|MO:Macao|MG:Madagascar|MW:Malawi|MY:Malaysia|MV:Maldives|ML:Mali|MT:Malta|MH:Marshall Islands|MQ:Martinique|MR:Mauritania|MU:Mauritius|YT:Mayotte|MX:Mexico|FM:Micronesia|MD:Moldova|MC:Monaco|MN:Mongolia|ME:Montenegro|MS:Montserrat|MA:Morocco|MZ:Mozambique|MM:Myanmar|NA:Namibia|NR:Nauru|NP:Nepal|NL:Netherlands|NC:New Caledonia|NZ:New Zealand|NI:Nicaragua|NE:Niger|NG:Nigeria|NU:Niue|MK:North Macedonia|KP:North Korea|NO:Norway|OM:Oman|PK:Pakistan|PW:Palau|PS:Palestine|PA:Panama|PG:Papua New Guinea|PY:Paraguay|PE:Peru|PH:Philippines|PL:Poland|PT:Portugal|PR:Puerto Rico|QA:Qatar|RE:Réunion|RO:Romania|RU:Russia|RW:Rwanda|BL:Saint Barthélemy|KN:Saint Kitts and Nevis|LC:Saint Lucia|MF:Saint Martin|VC:Saint Vincent and the Grenadines|WS:Samoa|SM:San Marino|ST:São Tomé and Príncipe|SA:Saudi Arabia|SN:Senegal|RS:Serbia|SC:Seychelles|SL:Sierra Leone|SG:Singapore|SX:Sint Maarten|SK:Slovakia|SI:Slovenia|SB:Solomon Islands|SO:Somalia|ZA:South Africa|KR:South Korea|SS:South Sudan|ES:Spain|LK:Sri Lanka|SD:Sudan|SR:Suriname|SE:Sweden|CH:Switzerland|SY:Syria|TW:Taiwan|TJ:Tajikistan|TZ:Tanzania|TH:Thailand|TL:Timor-Leste|TG:Togo|TK:Tokelau|TO:Tonga|TT:Trinidad and Tobago|TN:Tunisia|TR:Türkiye|TM:Turkmenistan|TC:Turks and Caicos Islands|TV:Tuvalu|UG:Uganda|UA:Ukraine|AE:United Arab Emirates|GB:United Kingdom|US:United States|UY:Uruguay|UZ:Uzbekistan|VU:Vanuatu|VA:Vatican City|VE:Venezuela|VN:Vietnam|VG:Virgin Islands (British)|VI:Virgin Islands (U.S.)|YE:Yemen|ZM:Zambia|ZW:Zimbabwe"
  .split("|").map(s=>{const i=s.indexOf(":");return [s.slice(0,i),s.slice(i+1)];});
const COUNTRY_NAME=Object.fromEntries(COUNTRIES);
const flag=iso=>iso.replace(/./g,c=>String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65));
document.querySelectorAll('select[data-country]').forEach(sel=>{
  let html=`<option value="" disabled selected>${t('sel_country')}</option>`;
  COUNTRIES.forEach(([iso,name])=>{ html+=`<option value="${iso}">${flag(iso)}  ${name}</option>`; });
  sel.innerHTML=html;
});

const panels=[...document.querySelectorAll('.panel')];
const track=document.getElementById('track'); const bars=document.getElementById('bars');
panels.forEach(()=>bars.insertAdjacentHTML('beforeend','<i></i>')); const barEls=[...bars.children];
let step=0; const LAST=panels.length-1;
const useMain = !!tg?.MainButton;       // un seul bouton : MainButton si dispo, sinon .fab
if(!useMain) document.getElementById('fab').classList.remove('hide');

const seg=document.getElementById('genderSeg'); const genderInput=document.querySelector('input[name=gender]');
seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
  seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  genderInput.value=b.dataset.v; document.getElementById('genderErr').classList.remove('show');});

function bindDrop(id){const inp=document.getElementById(id),zone=document.getElementById('d_'+id),img=zone.querySelector('img');
  zone.onclick=()=>inp.click();
  inp.onchange=()=>{const f=inp.files[0]; if(!f)return; zone.classList.add('filled'); img.src=URL.createObjectURL(f);
    (document.getElementById(id+'Err')||{classList:{remove(){}}}).classList.remove('show');};}
['idFront','idBack','selfie'].forEach(bindDrop);

// Passeport = une seule face -> on masque le verso (et on le ré-affiche pour CNI/permis)
const idTypeSel=document.querySelector('select[name=idType]');
function toggleBack(){ const isPass=idTypeSel.value==='PASSPORT';
  document.getElementById('idBackWrap').style.display=isPass?'none':'block';
  if(isPass){ const ib=document.getElementById('idBack'); ib.value='';
    document.getElementById('d_idBack').classList.remove('filled'); } }
idTypeSel.addEventListener('change',toggleBack); toggleBack();

function render(){
  track.style.transform=`translateX(-${step*100}%)`;
  panels.forEach((p,i)=>p.classList.toggle('active',i===step));
  barEls.forEach((b,i)=>b.className=i<step?'done':(i===step?'cur':''));
  document.getElementById('stepTitle').textContent=t(panels[step].dataset.tk);
  document.getElementById('stepCount').textContent=`${t('step')} ${step+1} / ${panels.length}`;
  if(step===LAST) buildRecap();
  const label = step===LAST ? t('btn_submit') : t('btn_continue');
  document.getElementById('next').textContent=label;
  if(useMain){ tg.MainButton.setText(label); tg.MainButton.show(); tg.MainButton.enable(); }
  if(tg?.BackButton){ step>0?tg.BackButton.show():tg.BackButton.hide(); }
  window.scrollTo({top:0,behavior:'smooth'});
}
function _age(s){ const b=new Date(s); if(isNaN(b)) return 0; const n=new Date();
  let a=n.getFullYear()-b.getFullYear(); const m=n.getMonth()-b.getMonth();
  if(m<0||(m===0&&n.getDate()<b.getDate())) a--; return a; }
function _emEl(el){
  return document.getElementById((el.name||el.id||'')+'Err')
    || document.getElementById((el.id||'')+'Err')
    || el.closest('.field')?.querySelector('.err-msg')
    || el.parentElement?.querySelector('.err-msg'); }
function showErr(el,key){ if(el.type!=='hidden'&&el.type!=='file') el.classList.add('bad');
  const em=_emEl(el); if(em){ em.textContent=t(key); em.classList.add('show'); } }
function clearErr(el){ if(el.classList) el.classList.remove('bad');
  const em=_emEl(el); if(em) em.classList.remove('show'); }
// Validation par champ : renvoie une clé d'erreur i18n, ou null si OK.
function fieldError(el){
  const name=el.name||el.id, v=(el.value||'').trim();
  if(el.type==='file') return (el.hasAttribute('data-req')&&el.files.length===0)?'e_photo':null;
  if(!v) return el.hasAttribute('data-req')?'e_req':null;     // vide : requis -> err, sinon OK
  if(name==='email' && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)) return 'e_email';
  if(name==='firstName'||name==='lastName'){
    if(!/^[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ '\-]*$/.test(v)) return 'e_name';
    const fn=(document.querySelector('[name=firstName]')?.value||'').trim();
    const ln=(document.querySelector('[name=lastName]')?.value||'').trim();
    if(fn.length+ln.length>23) return 'e_namelen'; }
  if(name==='dateOfBirth'){ const b=new Date(v); if(isNaN(b)) return 'e_date';
    if(b>new Date()) return 'e_dob_future'; const a=_age(v); if(a<18||a>65) return 'e_age'; }
  if(name==='phoneCountryCode' && !/^\d{1,3}$/.test(v)) return 'e_cc';
  if(name==='phoneNumber' && !/^\d{6,15}$/.test(v)) return 'e_phone_num';
  if(name==='addr_state' && !/^[A-Za-z0-9 ]+$/.test(v)) return 'err_state';
  if(name==='issueDate' && new Date(v)>new Date()) return 'e_issue_future';
  if(name==='expiryDate'){ const exp=new Date(v); if(exp<new Date()) return 'e_expired';
    const iss=document.querySelector('[name=issueDate]')?.value;
    if(iss && new Date(iss)>exp) return 'e_dates'; }
  return null;
}
function validStep(){
  let ok=true;
  panels[step].querySelectorAll('input,select').forEach(el=>{
    if(el.type==='hidden' && (el.name||el.id)!=='gender') return;
    const err=fieldError(el);
    if(err){ ok=false; showErr(el,err); } });
  return ok;
}
// erreurs en temps réel : on valide au blur, on efface dès qu'on corrige
document.addEventListener('focusout', e=>{ const el=e.target;
  if(el && el.matches && el.matches('input,select') && (el.name||el.id)){
    const err=fieldError(el); if(err) showErr(el,err); else clearErr(el); } });
document.addEventListener('input', e=>{ if(e.target) clearErr(e.target); });
function buildRecap(){
  const g=v=>document.querySelector(`[name="${v}"]`)?.value||'—';
  const cn=v=>{const c=document.querySelector(`[name="${v}"]`)?.value;return c?`${flag(c)} ${COUNTRY_NAME[c]||c}`:'—';};
  const gd=genderInput.value==='F'?t('g_f'):(genderInput.value==='M'?t('g_m'):'—');
  const rows=[[t('r_name'),`${g('firstName')} ${g('lastName')}`],[t('r_dob'),g('dateOfBirth')],[t('r_gender'),gd],
    [t('r_nat'),cn('nationality')],[t('r_email'),g('email')],[t('r_phone'),`+${g('phoneCountryCode')} ${g('phoneNumber')}`],
    [t('r_addr'),`${g('addr_line1')}, ${g('addr_city')} ${g('addr_state')} ${g('addr_postal')}, ${cn('addr_country')}`],
    [t('r_id'),`${document.querySelector('[name=idType]').selectedOptions[0].text} · ${g('nationalId')}`],
    [t('r_docs'),`${document.getElementById('idFront').files.length?'✓':'—'} ${document.getElementById('idBack').files.length?'✓':''} ${document.getElementById('selfie').files.length?'🤳':''}`]];
  document.getElementById('recap').innerHTML=rows.map(([k,v])=>`<div><span>${k}</span><b>${v}</b></div>`).join('');
}
async function advance(){ if(!validStep()){ tg?.HapticFeedback?.notificationOccurred?.('error'); return; }
  if(step<LAST){ step++; render(); return; } await submit(); }
document.getElementById('next').onclick=advance;
if(useMain) tg.MainButton.onClick(advance);
if(tg?.BackButton) tg.BackButton.onClick(()=>{ if(step>0){step--; render();} });
async function submit(){
  if(!uid){ showFinal('⚠️',t('idmiss_t'),t('idmiss_p')); return; }
  document.getElementById('wizard').classList.add('hide'); document.getElementById('fab').classList.add('hide');
  if(useMain) tg.MainButton.hide(); if(tg?.BackButton) tg.BackButton.hide();
  showFinal('<div class="spin"></div>',t('sending_t'),t('sending_p'));
  const fd=new FormData();
  document.querySelectorAll('[name]').forEach(el=>{ if(el.type==='file'){ if(el.files[0]) fd.append(el.name,el.files[0]); }
    else if(el.value) fd.append(el.name,el.value); });
  fd.append('uid',uid); fd.append('lang',lang); if(tg?.initData) fd.append('initData',tg.initData);
  try{ const r=await fetch('/api/kyc_submit',{method:'POST',body:fd}); const j=await r.json();
    if(j.success){ tg?.HapticFeedback?.notificationOccurred?.('success'); showFinal('✅',t('sent_t'),t('sent_p')); if(tg) setTimeout(()=>tg.close(),3200); }
    else if(j.code==='kyc_pending'){ showFinal('⏳',t('kyc_pending_t'),t('kyc_pending_p')); if(tg) setTimeout(()=>tg.close(),3200); }
    else if(j.code==='kyc_passed'){ showFinal('✅',t('kyc_passed_t'),t('kyc_passed_p')); if(tg) setTimeout(()=>tg.close(),3200); }
    else { tg?.HapticFeedback?.notificationOccurred?.('error'); showFinal('⚠️',t('fail_t'),mapErr(j.message)); retryBtn(); } }
  catch(e){ showFinal('⚠️',t('neterr_t'),String(e)); retryBtn(); }
}
function mapErr(m){ m=(m||'').toLowerCase();
  if(m.includes('phone')) return t('err_phone');
  if(m.includes('ssn')) return t('err_ssn');
  if(m.includes('us address')||m.includes('must be a us')) return t('err_us');
  if(m.includes('liveness')) return t('err_live');
  if(m.includes('analyzing file')||m.includes('corrupted')||m.includes('unsupported')) return t('err_file');
  if(m.includes('state')) return t('err_state');
  return t('fail_p'); }
function showFinal(emoji,h2,p){ const d=document.getElementById('done'); d.classList.remove('hide');
  d.innerHTML=`<div class="emoji">${emoji}</div><h2>${h2}</h2><p>${p}</p><div id="rb"></div>`; }
function backToForm(){ document.getElementById('done').classList.add('hide');
  document.getElementById('wizard').classList.remove('hide');
  if(!useMain) document.getElementById('fab').classList.remove('hide');
  render(); }   // ré-affiche les boutons (MainButton/Back) ; les données saisies sont conservées
function retryBtn(){ const rb=document.getElementById('rb');
  rb.innerHTML=`<button id="rbBtn" style="margin-top:18px;padding:14px 22px;border:0;border-radius:12px;background:var(--accent);color:var(--accent-text);font-weight:700">${t('btn_fix')}</button>`;
  document.getElementById('rbBtn').onclick=backToForm; }
function blockScreen(emoji,h2,p){ document.getElementById('wizard').classList.add('hide');
  document.getElementById('fab').classList.add('hide'); if(useMain&&tg?.MainButton) tg.MainButton.hide();
  if(tg?.BackButton) tg.BackButton.hide(); showFinal(emoji,h2,p); }
async function init(){
  if(uid){ try{
    const s=await (await fetch('/api/kyc_status?uid='+encodeURIComponent(uid))).json();
    if(s.status==='PENDING'){ blockScreen('⏳',t('kyc_pending_t'),t('kyc_pending_p')); return; }
    if(s.status==='PASSED'||s.status==='ACTIVE'){ blockScreen('✅',t('kyc_passed_t'),t('kyc_passed_p')); return; }
  }catch(e){} }
  render();
}
init();
</script>
